<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
--bg:#080808;--bg1:#0d0d0d;--bg2:#111;--bg3:#161616;
--border:#1e1e1e;--border2:#252525;
--text:#f0f0f0;--muted:#888;--dim:#444;--faint:#222;

body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;min-height:100vh;overflow-x:hidden}
input,textarea{font-family:inherit}

#header{background:var(--bg1);border-bottom:3px solid var(--red);padding:env(safe-area-inset-top,0) 16px 12px;padding-top:calc(env(safe-area-inset-top,0px) + 16px)}
#header .kicker{font-size:9px;letter-spacing:5px;color:var(--red);font-weight:800;margin-bottom:3px}
#header h1{font-size:21px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;line-height:1.1}
#sync-row{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
#sync-status{font-size:10px;font-weight:700;letter-spacing:1px;transition:all .3s}
#sync-btn{font-size:9px;font-weight:800;letter-spacing:1.5px;background:none;border:1px solid #222;border-radius:4px;color:#444;padding:3px 8px;cursor:pointer;font-family:inherit}

#save-bar{display:flex;gap:8px;padding:10px 12px;background:#0a0a0a;border-bottom:1px solid #131313}
.save-btn{flex:1;padding:10px 4px;border-radius:8px;border:none;font-family:inherit;font-size:10px;font-weight:800;letter-spacing:1px;cursor:pointer;text-transform:uppercase;transition:all .15s;text-align:center;line-height:1.3}
.btn-export{background:#FF450018;color:var(--red);border:1px solid #FF450044}
.btn-import{background:#1e1e1e;color:#555;border:1px solid #252525}
.btn-claude{background:#10B98118;color:#10B981;border:1px solid #10B98144}

#week-tabs{display:flex;gap:6px;padding:10px 12px;background:var(--bg);border-bottom:1px solid #131313;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#week-tabs::-webkit-scrollbar{display:none}
.wtab{flex:0 0 auto;min-width:68px;padding:8px 4px;border-radius:8px;border:2px solid var(--border);background:var(--bg1);color:var(--dim);font-size:10px;font-weight:900;letter-spacing:.5px;cursor:pointer;transition:all .15s;text-align:center}
.wtab div:nth-child(2){font-size:8px;margin-top:2px;opacity:.8}
.wtab div:nth-child(3){font-size:7px;margin-top:1px;opacity:.6}

#session-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px 12px}
.scard{background:var(--bg1);border:2px solid var(--border);border-radius:10px;padding:14px 12px;cursor:pointer;transition:all .18s}
.scard .sc-day{font-size:9px;letter-spacing:3px;font-weight:800;margin-bottom:5px}
.scard .sc-id{font-size:20px;font-weight:900}
.scard .sc-title{font-size:10px;color:var(--dim);margin-top:4px;line-height:1.4}
.scard .sc-badge{margin-top:8px;display:inline-block;border-radius:4px;padding:2px 8px;font-size:9px;font-weight:800}

#detail{padding:2px 12px 60px}
.detail-inner{border-radius:12px;padding:18px 14px}
.d-tag{font-size:9px;letter-spacing:4px;font-weight:800;margin-bottom:3px}
.d-title{font-size:19px;font-weight:900;text-transform:uppercase;letter-spacing:.8px;margin-bottom:18px}

.block{margin-bottom:22px}
.block-hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:8px;margin-bottom:10px;border-bottom:1px solid #1e1e1e}
.block-ttl{font-size:10px;font-weight:900;letter-spacing:3px;text-transform:uppercase}
.wod-tag{border-radius:4px;padding:2px 8px;font-size:8px;font-weight:800;letter-spacing:1px}

.ex-row{padding:11px 0;border-bottom:1px solid #131313}
.ex-top{display:flex;justify-content:space-between;align-items:flex-start}
.ex-name{font-size:13px;font-weight:700;line-height:1.3}
.ex-p{font-size:10px;color:var(--dim);margin-top:2px}
.ex-o{font-size:10px;color:#2a2a2a;margin-top:1px}
.ex-s{font-size:14px;font-weight:900;margin-left:12px;flex-shrink:0}
.log-row{display:flex;gap:8px;align-items:center;margin-top:10px}
.log-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;color:#ddd;font-size:12px;outline:none}
.inc-btn{width:36px;height:36px;border-radius:8px;flex-shrink:0;cursor:pointer;background:var(--bg3);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#333;transition:all .15s;user-select:none}
.inc-lbl{font-size:9px;font-weight:800;letter-spacing:2px;margin-top:5px}
.reps-input{width:100%;margin-top:6px;background:#0c0c0c;border:1px solid #1a1a1a;border-radius:6px;padding:7px 10px;color:#999;font-size:11px;outline:none;letter-spacing:.5px}
.note-input{width:100%;margin-top:6px;background:#0d0d0d;border:1px solid #181818;border-radius:6px;padding:7px 10px;color:var(--muted);font-size:11px;outline:none}

.wod-box{margin-top:12px;background:var(--bg2);border-radius:8px;padding:12px;border:1px solid var(--border)}
.wod-box-ttl{font-size:9px;color:var(--red);font-weight:800;letter-spacing:3px;margin-bottom:8px}
.wod-score{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;color:#ddd;font-size:12px;outline:none;margin-bottom:6px}
.wod-note{width:100%;background:var(--bg1);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--muted);font-size:11px;outline:none}

/* ── DONNÉES SESSION PRÉCÉDENTE (PAR EXERCICE) ── */
.prev-data{margin-top:8px;background:#111418;border-radius:6px;padding:8px 10px;border-left:2px solid #F59E0B44;display:flex;flex-direction:column;gap:3px}
.prev-lbl{font-size:8px;font-weight:800;letter-spacing:2px;color:#F59E0Baa;text-transform:uppercase;margin-bottom:2px}
.prev-charge{font-size:13px;font-weight:700;color:#d4a843}
.prev-up{font-size:9px;font-weight:800;color:#4ade80;margin-left:5px;letter-spacing:1px}
.prev-reps{font-size:11px;font-weight:700;color:#c09030;margin-top:2px}
.prev-note-txt{font-size:10px;color:#888;line-height:1.5;font-style:italic}
.prev-wod{margin-bottom:10px;background:#111418;border-radius:6px;padding:8px 10px;border-left:2px solid #F59E0B33}
.prev-wod .prev-lbl{margin-bottom:3px}
.prev-wod .prev-charge{font-size:12px;color:#d4a843}

.prog-note{margin-top:10px;background:var(--bg2);border-radius:8px;padding:12px;border-left:3px solid var(--red)}
.prog-note-ttl{font-size:9px;color:var(--red);font-weight:800;letter-spacing:3px;margin-bottom:6px}
.prog-note-txt{font-size:11px;color:var(--dim);line-height:1.7}

#empty-state{text-align:center;padding:20px 0;color:var(--faint);font-size:11px;letter-spacing:2px}
#bottom-spacer{height:calc(env(safe-area-inset-bottom,0px) + 20px)}
#file-input{display:none}

#overlay{display:none;position:fixed;inset:0;background:#000a;z-index:200;align-items:flex-end}
#overlay.open{display:flex}
#modal{width:100%;background:#111;border-radius:16px 16px 0 0;padding:24px 16px calc(env(safe-area-inset-bottom,0px) + 24px);max-height:88vh;overflow-y:auto}
#modal-ttl{font-size:15px;font-weight:900;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
#modal-sub{font-size:12px;color:#555;margin-bottom:14px;line-height:1.6}
#modal-body{background:#0d0d0d;border-radius:8px;padding:14px;font-size:11px;color:#777;line-height:1.9;max-height:38vh;overflow-y:auto;white-space:pre-wrap;word-break:break-word;border:1px solid #1e1e1e;margin-bottom:14px;-webkit-user-select:all;user-select:all}
.mbtn{width:100%;padding:14px;border-radius:10px;border:none;font-family:inherit;font-size:13px;font-weight:800;letter-spacing:1.5px;cursor:pointer;margin-bottom:8px;text-transform:uppercase}
.mbtn-primary{background:var(--red);color:#fff}
.mbtn-green{background:#10B981;color:#000}
.mbtn-sec{background:#1e1e1e;color:#666}

#toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 20px);left:50%;transform:translateX(-50%) translateY(20px);background:#10B981;color:#000;font-weight:800;font-size:12px;letter-spacing:1.5px;padding:10px 20px;border-radius:20px;opacity:0;transition:all .3s;z-index:300;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.error{background:#FF4500;color:#fff}
</style>

async function sbLoad(){
try{
const {data,error}=await sb.from(SB_TABLE).select("data").eq("store_key",STORE_KEY).maybeSingle();
if(error||!data)return null;
const d=data.data;
return d&&Object.keys(d).length>0?d:null;
}catch{return null;}
}
async function sbSave(data){
try{
const {error}=await sb.from(SB_TABLE).upsert({store_key:STORE_KEY,data},{onConflict:"store_key"});
return !error;
}catch{return false;}

let syncTimer=null;
function setSyncStatus(s){
const el=document.getElementById("sync-status");
if(s==="ok"){el.textContent="☁️ Synchronisé";el.style.color="#10B981";}
else if(s==="syncing"){el.textContent="⏳ Sync…";el.style.color="#F59E0B";}
else if(s==="offline"){el.textContent="📵 Hors ligne — local";el.style.color="#888";}
else if(s==="error"){el.textContent="⚠️ Erreur sync";el.style.color="#FF4500";}
}
async function syncNow(){
setSyncStatus("syncing");
const ok=await sbSave(logs);
setSyncStatus(ok?"ok":"error");
if(ok)toast("☁️ Synchronisé !");
else toast("⚠️ Hors ligne — données locales OK","error");
}

let state={week:1,session:null};
let logs={};

async function initData(){
setSyncStatus("syncing");
const cloud=await sbLoad();
if(cloud&&Object.keys(cloud).length>0){
logs=cloud;saveLocal();render();setSyncStatus("ok");return;
}
try{const r=localStorage.getItem(STORE_KEY);if(r)logs=JSON.parse(r);}catch{}
render();
if(Object.keys(logs).length>0){
const ok=await sbSave(logs);setSyncStatus(ok?"ok":"offline");
}else{setSyncStatus("offline");}
}
function saveLocal(){try{localStorage.setItem(STORE_KEY,JSON.stringify(logs));}catch{}}
function save(){
saveLocal();
clearTimeout(syncTimer);setSyncStatus("syncing");
syncTimer=setTimeout(async()=>{const ok=await sbSave(logs);setSyncStatus(ok?"ok":"offline");},500);
}
function toast(msg,type){
const t=document.getElementById("toast");
t.textContent=msg;t.className=type==="error"?"show error":"show";
setTimeout(()=>t.className="",2500);
}

function openExport(){
const data=JSON.stringify(logs,null,2);
const date=new Date().toLocaleDateString("fr-FR").replace(/\//g,"-");
document.getElementById("modal-ttl").textContent="💾 Exporter";
document.getElementById("modal-sub").textContent="Sauvegarde locale — en plus de la sync Supabase automatique.";
document.getElementById("modal-body").textContent=data;
const btn=document.getElementById("mbtn-action");
btn.textContent="⬇️ Télécharger le fichier";btn.className="mbtn mbtn-primary";
btn.onclick=()=>{
const blob=new Blob([data],{type:"application/json"});
const url=URL.createObjectURL(blob);
const a=document.createElement("a");a.href=url;
a.download=`bloc2_${date}.json`;
document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
toast("✓ Fichier téléchargé !");closeModal();
};
openModal();
}
function importData(event){
const file=event.target.files[0];if(!file)return;
const reader=new FileReader();
reader.onload=e=>{
try{logs=JSON.parse(e.target.result);save();render();toast("✓ Données importées !");}
catch{toast("❌ Fichier invalide","error");}
};
reader.readAsText(file);event.target.value="";
}

function openClaude(){
const lines=["=== MON BILAN — BLOC 2 MUSCU×HALTÉRO×CF ===\n"];
lines.push(`Date : ${new Date().toLocaleDateString("fr-FR")}\n`);
let hasData=false;
[1,2,3,4].forEach(w=>{
let wLines=[];
["A","B","C","D"].forEach(s=>{
const sk=`${w}-${s}`;const sess=P[sk];if(!sess)return;
let sLines=[];
sess.blocks.forEach((block,bi)=>{
block.exs.forEach((ex,ei)=>{
const wv=logs[`${sk}-${bi}-${ei}-w`];
const rv=logs[`${sk}-${bi}-${ei}-r`];
const inc=logs[`${sk}-${bi}-${ei}-inc`];
const nv=logs[`${sk}-${bi}-${ei}-n`];
if(wv||nv){
let l=` • ${ex.n||""}`;
if(ex.s)l+=` (${ex.s})`;
if(wv)l+=` → ${wv}`;
if(rv)l+=` [${rv}]`;
if(inc)l+=` ↑`;
if(nv)l+=`\n   Note: ${nv}`;
sLines.push(l);hasData=true;
}
});
if(block.wod){
const sc=logs[`${sk}-wod${bi}-score`];const sn=logs[`${sk}-wod${bi}-note`];
if(sc||sn){let l=` • WOD: ${sc||"—"}`;if(sn)l+=`\n   Note: ${sn}`;sLines.push(l);hasData=true;}
}
});
if(sLines.length){wLines.push(`\n SÉANCE ${s} — ${sess.title}`);wLines.push(...sLines);}
});
if(wLines.length){lines.push(`\n── SEMAINE ${w} ──`);lines.push(...wLines);}
});
if(!hasData)lines.push("\nAucune donnée enregistrée pour l'instant.");
lines.push("\n\n=== DEMANDE ===");
lines.push("Voici mon bilan Bloc 2. Analyse mes progressions et crée mon Bloc 3.");
const summary=lines.join("\n");
document.getElementById("modal-ttl").textContent="🤖 Partager avec Claude";
document.getElementById("modal-sub").textContent="Copie ce résumé et colle-le dans Claude pour le Bloc 3.";
document.getElementById("modal-body").textContent=summary;
const btn=document.getElementById("mbtn-action");
btn.textContent="📋 Copier le résumé";btn.className="mbtn mbtn-green";
btn.onclick=()=>{
if(navigator.clipboard){navigator.clipboard.writeText(summary).then(()=>toast("✓ Copié !")).catch(()=>selectBody());}
else selectBody();
};
openModal();
}
function selectBody(){
const el=document.getElementById("modal-body");
const r=document.createRange();r.selectNodeContents(el);
const s=window.getSelection();s.removeAllRanges();s.addRange(r);
toast("Sélectionne et copie !");
}
function openModal(){document.getElementById("overlay").classList.add("open")}
function closeModal(){document.getElementById("overlay").classList.remove("open")}
function overlayClick(e){if(e.target===document.getElementById("overlay"))closeModal();}

function countLogged(w,s){
const sess=P[`${w}-${s}`];if(!sess)return 0;
return sess.blocks.reduce((a,b,bi)=>a+b.exs.filter((_,ei)=>logs[`${w}-${s}-${bi}-${ei}-w`]).length,0);
}

// ═══ RENDER ═══
function render(){renderWeekTabs();renderSessionGrid();renderDetail();}

function renderWeekTabs(){
document.getElementById("week-tabs").innerHTML=WEEKS.map(w=>`
<div class="wtab" onclick="selectWeek(${w.id})"
style="border-color:${state.week===w.id?w.color:"#1e1e1e"};
background:${state.week===w.id?w.color+"18":"#0d0d0d"};
color:${state.week===w.id?w.color:"#444"}">
<div>${w.label}</div><div>${w.name}</div><div>${w.pct}</div>
</div>`).join("");
}

function renderSessionGrid(){
document.getElementById("session-grid").innerHTML=["A","B","C","D"].map(sid=>{
const sk=`${state.week}-${sid}`;
const sess=P[sk];if(!sess)return"";
const m=META[sid];const ac=ACCENT[sid];
const isActive=state.session===sid;
const logged=countLogged(state.week,sid);
return `<div class="scard" onclick="selectSession('${sid}')"
style="border-color:${isActive?ac:"#1e1e1e"};background:${isActive?"#131313":"#0d0d0d"};
box-shadow:${isActive?`0 0 18px ${ac}1a`:"none"}">
<div class="sc-day" style="color:${ac}">${m.day}</div>
<div class="sc-id">SÉANCE ${sid}</div>
<div class="sc-title">${m.title}</div>
${logged?`<div class="sc-badge" style="background:${ac}22;color:${ac}">✓ ${logged} noté${logged>1?"s":""}</div>`:""}
</div>`;
}).join("");
document.getElementById("empty-state").style.display=state.session?"none":"block";
}

function renderDetail(){
const el=document.getElementById("detail");
if(!state.session){el.innerHTML="";return;}
const sk=`${state.week}-${state.session}`;
const sess=P[sk];if(!sess){el.innerHTML="";return;}
const ac=ACCENT[state.session];
const prevWeekMap={1:null,2:1,3:2,4:3,5:3,6:5,7:6};
const prevWeekNum=prevWeekMap[state.week]||null;
const prevSk=prevWeekNum?`${prevWeekNum}-${state.session}`:null;

let h=`<div class="detail-inner" style="border:1px solid ${ac}2a;box-shadow:0 0 30px ${ac}0d;background:#0d0d0d">
<div class="d-tag" style="color:${ac}">${sess.tag}</div>
<div class="d-title">${sess.title}</div>`;

sess.blocks.forEach((block,bi)=>{
const tc=block.wi?TAG_COL[block.wi.tag]||"#555":ac;
h+=`<div class="block">
<div class="block-hdr" style="border-color:${ac}2a">
<div class="block-ttl" style="color:${ac}">${block.e} ${block.t}</div>
${block.wod&&block.wi?`<div class="wod-tag" style="background:${tc}22;border:1px solid ${tc};color:${tc}">${block.wi.tag} · ${block.wi.dur}</div>`:""}
</div>`;

block.exs.forEach((ex,ei)=>{
if(!ex)return;
const wK=`${sk}-${bi}-${ei}-w`;
const rK=`${sk}-${bi}-${ei}-r`;
const iK=`${sk}-${bi}-${ei}-inc`;
const nK=`${sk}-${bi}-${ei}-n`;
const showLog=!block.wod&&ex.p&&!ex.p.startsWith("60→");
const isTest=ex.test;const incOn=!!logs[iK];

const prevW=prevSk?(logs[`${prevSk}-${bi}-${ei}-w`]||''):'';
const prevR=prevSk?(logs[`${prevSk}-${bi}-${ei}-r`]||''):'';
const prevN=prevSk?(logs[`${prevSk}-${bi}-${ei}-n`]||''):'';
const prevInc=prevSk?!!logs[`${prevSk}-${bi}-${ei}-inc`]:false;
const hasPrev=!!(prevW||prevR||prevN);

h+=`<div class="ex-row">
<div class="ex-top">
<div>
<div class="ex-name">${ex.n||""}</div>
${ex.p?`<div class="ex-p" style="${isTest?`color:${ac};font-weight:700`:""}">${ex.p}</div>`:""}
${ex.o?`<div class="ex-o">${ex.o}</div>`:""}
</div>
${ex.s?`<div class="ex-s" style="color:${ac}">${ex.s}</div>`:""}
</div>`;

if(showLog||isTest){
if(hasPrev){
h+=`<div class="prev-data">
<span class="prev-lbl">S${prevWeekNum} — DERNIÈRE FOIS</span>
${prevW?`<span class="prev-charge">⚖️ ${prevW}${prevInc?`<span class="prev-up"> ↑ AUGMENTÉ</span>`:''}</span>`:''}
${prevR?`<div class="prev-reps">📊 Séries : ${prevR}</div>`:''}
${prevN?`<div class="prev-note-txt">💬 ${prevN}</div>`:''}
</div>`;
}
h+=`<div class="log-row">
<input class="log-input" type="text" inputmode="decimal"
placeholder="${isTest?"Résultat / nouveau max…":"Charge utilisée…"}"
value="${(logs[wK]||"").replace(/"/g,"&quot;")}"
oninput="logVal('${wK}',this.value,this,'${ac}')"
style="border-color:${logs[wK]?ac+"55":"#252525"}">
${!isTest?`<div class="inc-btn" onclick="toggleInc('${iK}','${ac}')"
style="background:${incOn?ac:"#161616"};border-color:${incOn?ac:"#252525"};color:${incOn?"#000":"#333"}">↑</div>`:""}
</div>
${!isTest?`<input class="reps-input" type="text" inputmode="decimal"
placeholder="Reps par série (ex: 10/10/9/8)"
value="${(logs[rK]||"").replace(/"/g,"&quot;")}"
oninput="logVal('${rK}',this.value)">`:""}
${!isTest&&incOn?`<div class="inc-lbl" style="color:${ac}">✓ AUGMENTER LA SEMAINE PROCHAINE (+2–3%)</div>`:""}
<input class="note-input" type="text"
placeholder="Notes (RPE, sensations, technique…)"
value="${(logs[nK]||"").replace(/"/g,"&quot;")}"
oninput="logVal('${nK}',this.value)">`;
}
h+=`</div>`;
});

if(block.wod){
const sK=`${sk}-wod${bi}-score`;const nbK=`${sk}-wod${bi}-note`;
const prevWodScore=prevSk?(logs[`${prevSk}-wod${bi}-score`]||''):'';
const prevWodNote=prevSk?(logs[`${prevSk}-wod${bi}-note`]||''):'';
const hasPrevWod=!!(prevWodScore||prevWodNote);
h+=`<div class="wod-box">
<div class="wod-box-ttl">📋 NOTER MON WOD</div>
${hasPrevWod?`<div class="prev-wod">
<span class="prev-lbl">S${state.week-1} — DERNIER WOD</span>
${prevWodScore?`<div class="prev-charge">🏁 ${prevWodScore}</div>`:''}
${prevWodNote?`<div class="prev-note-txt">💬 ${prevWodNote}</div>`:''}
</div>`:''}
<input class="wod-score" type="text" placeholder="Temps / Rounds / Score…"
value="${(logs[sK]||"").replace(/"/g,"&quot;")}"
oninput="logVal('${sK}',this.value,this,'#FF4500')"
style="border-color:${logs[sK]?"#FF450099":"#252525"}">
<input class="wod-note" type="text" placeholder="Ressenti, ajustements, prochaine fois…"
value="${(logs[nbK]||"").replace(/"/g,"&quot;")}"
oninput="logVal('${nbK}',this.value)">
</div>`;
}
h+=`</div>`;
});

h+=`<div class="prog-note">
<div class="prog-note-ttl">${state.week===4?"SEMAINE DE DÉCHARGE":state.week===7?"SEMAINE PIC":"RÈGLE DE PROGRESSION"}</div>
<div class="prog-note-txt">${state.week===4
?"Volumes réduits — c'est obligatoire, pas optionnel · Le corps se reconstruit cette semaine · Ne rajoute pas de volume"
:state.week===7
?"Semaine la plus lourde du programme — pas de tests 1RM · WODs légers · Dors 8h+ · Mange en surplus"
:"↑ coché = +2–3% semaine suivante · Note tes reps série par série · La technique prime toujours"
}</div>
</div></div>`;
el.innerHTML=h;
}

function selectWeek(w){state.week=w;state.session=null;render();}
function selectSession(s){state.session=state.session===s?null:s;renderSessionGrid();renderDetail();}
function logVal(key,val,el,ac){
logs[key]=val;save();
if(el&&ac)el.style.borderColor=val?ac+"55":"#252525";
}
function toggleInc(key){logs[key]=!logs[key];save();renderDetail();renderSessionGrid();}

initData();
</script>
</body>
</html>
